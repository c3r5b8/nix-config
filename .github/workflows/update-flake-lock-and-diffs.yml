name: Update flake.lock

on:
  schedule:
    - cron: '0 2 * * *'
      timezone: 'Europe/Kyiv'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    name: Update flake + generate nvd report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v13
      - uses: DeterminateSystems/flakehub-cache-action@v1
      - name: Force Google DNS
        run: |
          sudo rm -f /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get current date
        id: date
        run: echo "DATE=$(TZ='Europe/Kyiv' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Update flake inputs and generate per-host nvd diffs
        id: diff
        run: ./scripts/flake-update-diff.sh

      - name: Upload error report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-update-error-report
          path: error-report.md
          if-no-files-found: ignore

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/flake-update-${{ steps.date.outputs.DATE }}
          title: "chore: update flake inputs ${{ steps.date.outputs.DATE }}"
          commit-message: "chore: update flake inputs ${{ steps.date.outputs.DATE }}"
          body: |
            ## Automated flake.lock update
            Package changes per host (via `nvd`):
            ```diff
            ${{ steps.diff.outputs.report || 'No report generated' }}
            ```
            ---
            *Auto-generated by `.github/workflows/update-flake-lock-and-diffs.yml`*
          delete-branch: true

  # Failure reporter
  report-failure:
    name: Report build failure as Issue
    runs-on: ubuntu-latest
    needs: update
    if: failure() && needs.update.result == 'failure'
    steps:
      - name: Download error report artifact
        uses: actions/download-artifact@v4
        with:
          name: flake-update-error-report
          path: .
        continue-on-error: true

      - name: Get current date
        id: date
        run: echo "DATE=$(TZ='Europe/Kyiv' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create Failure Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f error-report.md ]; then
            BODY=$(cat error-report.md)
          else
            BODY="### ❌ Build failed\n\nError report file was not generated."
          fi

          BODY="${BODY}

          ---
          [Failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          gh issue create \
            --title "Flake update failed - ${{ steps.date.outputs.DATE }}" \
            --body "$BODY" \
            --label "bug" \
            --label "flake-update" \
            --label "automated"
