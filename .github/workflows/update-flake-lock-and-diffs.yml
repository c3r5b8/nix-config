name: Update flake.lock

on:
  schedule:
    - cron: '0 2 * * *'
      timezone: 'Europe/Kyiv'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    name: Update flake + generate nvd report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v13
      - uses: DeterminateSystems/flakehub-cache-action@v1
      - name: Force Google DNS
        run: |
          sudo rm -f /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get current date
        id: date
        run: echo "DATE=$(TZ='Europe/Kyiv' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Update flake inputs and generate per-host nvd diffs
        id: diff
        run: ./scripts/flake-update-diff.sh

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/flake-update-${{ steps.date.outputs.DATE }}
          title: "chore: update flake inputs ${{ steps.date.outputs.DATE }}"
          commit-message: "chore: update flake inputs ${{ steps.date.outputs.DATE }}"
          body: |
            ## Automated flake.lock update
            Package changes per host (via `nvd`):
            ```diff
            ${{ steps.diff.outputs.report || 'No report generated' }}
            ```
            ---
            *Auto-generated by `.github/workflows/update-flake-lock-and-diffs.yml`*
          delete-branch: true

  # Failure reporter
  report-failure:
    name: Report build failure as Issue
    runs-on: ubuntu-latest
    needs: update
    if: failure() && needs.update.result == 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Create Failure Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > failure-report.md << 'EOF'
          **Automated flake update failed.**

          **Date:** ${{ steps.date.outputs.DATE || 'Unknown' }}  
          **Workflow run:** [View logs here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          The build failed (most recently on host `acrab` according to your report).

          Check the **"Update flake inputs..."** step for the exact error and full build logs.
          EOF

          gh issue create \
            --title "❌ Flake Update Failed — ${{ github.run_id }} — $(date +%Y-%m-%d)" \
            --body-file failure-report.md \
            --label bug,flake-update,automated
